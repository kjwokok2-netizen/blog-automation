name: Auto Daily Market Report

on:
  schedule:
    # 매일 한국 시간 오후 6시 (UTC 기준 오전 9시)에 자동 실행됩니다.
    - cron: '0 9 * * *'
  workflow_dispatch: # 원할 때 수동으로 실행할 수 있는 버튼을 추가합니다.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필요 라이브러리 설치
      run: |
        pip install yfinance google-generativeai

    - name: 파이썬 스크립트 실행하여 리포트 생성
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python generate_daily_post.py

    - name: 생성된 마크다운 파일 커밋 및 푸시
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Auto-generated daily market report" || echo "No changes to commit"
        git push
