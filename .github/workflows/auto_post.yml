name: Auto Daily Market Report

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 라이브러리 설치
      run: |
        pip install -U yfinance google-generativeai # -U 옵션으로 최신버전 강제 설치

    - name: 리포트 생성
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python generate_daily_post.py

    - name: 커밋 및 푸시
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Update daily report" || echo "No changes"
        git push
